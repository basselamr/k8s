name: Build and Deploy Bookstore

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: self-hosted

    permissions:
      contents: read
      packages: write

    env:
      IMAGE_NAME: basamr/bookstore

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Build JAR
        run: mvn -DskipTests package

      - name: Log in to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u ${{ secrets.DOCKER_USERNAME }} --password-stdin

      - name: Build image
        run: docker build -t $IMAGE_NAME:${{ github.sha }} .

      - name: Push image
        run: docker push $IMAGE_NAME:${{ github.sha }}

      - name: Update image in deployment
        run: |
          kubectl set image deployment/bookstore-app \
            bookstore-app=$IMAGE_NAME:${{ github.sha }}

      - name: Apply manifests
        run: kubectl apply -f k8s/

      - name: Restart deployment
        run: kubectl rollout restart deployment/bookstore-app

      - name: Wait for rollout
        run: kubectl rollout status deployment/bookstore-app